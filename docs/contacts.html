<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nova Studio — контакты</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="page page--contacts">
  <header class="header">
    <div class="header__inner">
      <a href="index.html" class="header__logo">Nova<span class="header__logo-accent">Studio</span></a>
      <nav class="nav">
        <button type="button" class="nav__burger" aria-label="Меню">
          <span class="nav__burger-line"></span>
          <span class="nav__burger-line"></span>
          <span class="nav__burger-line"></span>
        </button>
        <ul class="nav__list">
          <li><a href="index.html" class="nav__link">Главная</a></li>
          <li><a href="about.html" class="nav__link">О нас</a></li>
          <li><a href="contacts.html" class="nav__link nav__link--active">Контакты</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="page__main">
    <div class="content">
      <h1 class="content__title">Контакты</h1>
      <p class="content__text">
        Форма обратной связи — блок <strong>form</strong> с элементами form__group, form__label, form__input.
      </p>

      <form class="form" action="#" method="post">
        <div class="form__group">
          <label class="form__label" for="name">Имя</label>
          <input class="form__input" type="text" id="name" name="name" placeholder="Ваше имя" required>
        </div>
        <div class="form__group">
          <label class="form__label" for="email">Email</label>
          <input class="form__input" type="email" id="email" name="email" placeholder="mail@example.com" required>
        </div>
        <div class="form__group">
          <label class="form__label" for="message">Сообщение</label>
          <textarea class="form__textarea" id="message" name="message" placeholder="Текст сообщения"></textarea>
        </div>
        <button type="submit" class="button button--primary">Отправить</button>
      </form>

      <h2 class="content__subtitle">Адрес</h2>
      <p class="content__text">г. Москва, учебный проект ITHUB<br>Email: studio@example.com</p>
    </div>
  </main>

  <footer class="footer">
    <div class="footer__inner">
      <p class="footer__copy">© 2026 Nova Studio</p>
      <div class="footer__links">
        <a href="index.html" class="footer__link">Главная</a>
        <a href="about.html" class="footer__link">О нас</a>
        <a href="contacts.html" class="footer__link">Контакты</a>
      </div>
    </div>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
